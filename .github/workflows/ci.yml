name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm           

      - name: Install dependencies
        run: npm ci            

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci
        env:
          NODE_ENV: test
